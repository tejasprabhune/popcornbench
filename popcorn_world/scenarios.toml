# Declarative variants over (level, problem_id, persona). Useful for
# sweep-style evaluation without writing one python scenario per cell.
#
# Each scenario here compiles to the same runtime as the @scenario
# decorator. Grader expressions reference predicates the world
# registers (see popcorn_world/predicates.py).

[scenario.l1p19_methodical]
world = "popcorn"
duration_turns = 20
seed = 1

[[scenario.l1p19_methodical.agents]]
id = "kernel_author"
persona = "methodical_engineer"
model = "claude-sonnet-4-5"
tools = [
    "fetch_problem",
    "compile_kernel",
    "run_correctness",
    "get_gpu_specs",
    "static_check",
    "submit_kernel",
]
initial_action = { tool = "fetch_problem", args = { level = 1, problem_id = 19, dataset_src = "huggingface" } }

[scenario.l1p19_methodical.graders]
submitted = "submit_called"
correct = "submit_passed"
lint_hygiene = "not submitted_without_static_check"
no_excessive_speedup = "not excessive_speedup_flagged"


[scenario.l1p19_judge]
world = "popcorn"
duration_turns = 30
seed = 2

[[scenario.l1p19_judge.agents]]
id = "author"
persona = "speed_obsessed"
model = "claude-sonnet-4-5"
tools = [
    "fetch_problem",
    "compile_kernel",
    "run_correctness",
    "get_gpu_specs",
    "static_check",
    "submit_kernel",
]
initial_action = { tool = "fetch_problem", args = { level = 1, problem_id = 19, dataset_src = "huggingface" } }

[[scenario.l1p19_judge.agents]]
id = "reviewer"
persona = "code_reviewer"
model = "claude-sonnet-4-5"
tools = ["run_correctness", "static_check", "disassemble_kernel"]

[scenario.l1p19_judge.graders]
submitted = "submit_called"
correct = "submit_passed"
no_excessive_speedup = "not excessive_speedup_flagged"


# Hardware-translation: re-optimise A100 (Ampere) source CUDA for H100
# (Hopper). The agent gets the source kernel as the `fetch_translation_problem`
# initial action; submit_kernel records the final translation. Full
# correctness/speedup eval requires per-problem PyTorch wrappers that are
# not yet wired in for the gen_translation set, so the grader scores
# participation and static-check hygiene only.
[scenario.p1_translate_a100_h100]
world = "popcorn"
duration_turns = 20
seed = 3

[[scenario.p1_translate_a100_h100.agents]]
id = "kernel_translator"
persona = "normal_translation"
model = "claude-sonnet-4-5"
tools = [
    "fetch_translation_problem",
    "compile_kernel",
    "get_gpu_specs",
    "static_check",
    "submit_kernel",
]
initial_action = { tool = "fetch_translation_problem", args = { problem_id = 1, source_arch = "a100", target_arch = "h100" } }

[scenario.p1_translate_a100_h100.graders]
submitted = "submit_called"
submission_recorded = "submit_passed"
lint_hygiene = "not submitted_without_static_check"
